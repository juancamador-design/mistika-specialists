    <button class="mk-lang-btn"   data-lang="en" onclick="mkSetLang('en')">EN</button>
  </div>

  <div class="mk-hero">
    <div class="mk-eyebrow" data-es="Mistika · Guías Espirituales" data-en="Mistika · Spiritual Guides">Mistika · Guías Espirituales</div>
    <h1 class="mk-hero-h1" data-es="Conoce a Nuestros<br><em>Especialistas</em>" data-en="Meet Our<br><em>Specialists</em>">
      Conoce a Nuestros<br><em>Especialistas</em>
    </h1>
    <p class="mk-hero-sub"
       data-es="Cada guía ha sido seleccionado por su autenticidad, experiencia y profundidad espiritual. Encuentra el que resuena contigo."
       data-en="Every guide has been chosen for their authenticity, experience and spiritual depth. Find the one that resonates with you.">
      Cada guía ha sido seleccionado por su autenticidad, experiencia y profundidad espiritual.
    </p>
    <div class="mk-count"><b id="mkVisCount">—</b>&nbsp;<span data-es="especialistas disponibles" data-en="specialists available">especialistas disponibles</span></div>

  <div class="mk-filters">
    <div class="mk-filter-groups">
      <div class="mk-fg">

        <div class="mk-pills">

          <button class="mk-pill" data-f="tecnica" data-v="astrologia"  data-es="Astrología"    data-en="Astrology">Astrología</button>
          <button class="mk-pill" data-f="tecnica" data-v="numerologia" data-es="Numerología"   data-en="Numerology">Numerología</button>
          <button class="mk-pill" data-f="tecnica" data-v="akashic"     data-es="Akásicos"      data-en="Akashic">Akásicos</button>
          <button class="mk-pill" data-f="tecnica" data-v="coaching"    data-es="Coaching/NLP"  data-en="Coaching/NLP">Coaching</button>
          <button class="mk-pill" data-f="tecnica" data-v="meditacion"  data-es="Meditación"    data-en="Meditation">Meditación</button>
          <button class="mk-pill" data-f="tecnica" data-v="medium"      data-es="Mediumidad"    data-en="Mediumship">Mediumidad</button>

      </div>
      <div class="mk-fg">
        <div class="mk-flabel" data-es="Idioma" data-en="Language">Idioma</div>
        <div class="mk-pills">
          <button class="mk-pill on" data-f="idioma" data-v="all" data-es="Todos" data-en="All">Todos</button>
          <button class="mk-pill" data-f="idioma" data-v="es" data-es="Español"   data-en="Spanish">Español</button>
          <button class="mk-pill" data-f="idioma" data-v="en" data-es="Inglés"    data-en="English">Inglés</button>
          <button class="mk-pill" data-f="idioma" data-v="pt" data-es="Portugués" data-en="Portuguese">Portugués</button>
        </div>
      </div>
      <div class="mk-fg">
        <div class="mk-flabel" data-es="Enfoque" data-en="Focus">Enfoque</div>
        <div class="mk-pills">
          <button class="mk-pill on" data-f="enfoque" data-v="all"            data-es="Todos"           data-en="All">Todos</button>
          <button class="mk-pill"    data-f="enfoque" data-v="amor"           data-es="Amor"            data-en="Love">Amor</button>
          <button class="mk-pill"    data-f="enfoque" data-v="carrera"        data-es="Carrera"         data-en="Career">Carrera</button>
          <button class="mk-pill"    data-f="enfoque" data-v="salud"          data-es="Salud"           data-en="Health">Salud</button>
          <button class="mk-pill"    data-f="enfoque" data-v="espiritualidad" data-es="Espiritualidad"  data-en="Spirituality">Espiritualidad</button>
          <button class="mk-pill"    data-f="enfoque" data-v="proposito"      data-es="Propósito"       data-en="Purpose">Propósito</button>

    </div>
    <div class="mk-search-row">
      <input class="mk-search" id="mkSearch" type="text"
             data-ph-es="Buscar por nombre o especialidad..."
             data-ph-en="Search by name or specialty..."
             placeholder="Buscar por nombre o especialidad...">
      <button class="mk-clear-btn" id="mkClearBtn" data-es="Limpiar" data-en="Clear">Limpiar</button>
    </div>
  </div>

  <div class="mk-grid" id="mkGrid">
    <div class="mk-status" id="mkStatus">
      Cargando especialistas…<small>un momento</small>
    </div>
  </div>

</div>

<script>
// ============================================================
// CONFIGURA AQUÍ TU GOOGLE SHEET
// ============================================================
var MK_SHEET_ID   = 'TU_SHEET_ID_AQUI';   // ID de tu Google Sheet
var MK_SHEET_NAME = 'Especialistas';        // Nombre de la pestaña

// ============================================================
// NO TOQUES NADA ABAJO
// ============================================================
var MK_COLORS = ['t-violet','t-teal','t-rose','t-amber','t-sky','t-gold'];
var MK_AVAIL  = {
  es:{today:'Disponible hoy',week:'Esta semana',none:'Sin citas'},
  en:{today:'Available today',week:'This week', none:'Unavailable'}
};
var MK_BOOK = {es:'Reservar sesión', en:'Book a session'};

var mkLang    = localStorage.getItem('mk_lang') || 'es';
var mkData    = [];
var mkFilters = {tecnica:'all', idioma:'all', enfoque:'all'};
var mkSearch  = '';

function mkStars(r){
  var n = Math.min(5,Math.max(0,Math.round(parseFloat(r)||5)));
  return '&#9733;'.repeat(n) + '<span style="opacity:.2">&#9733;</span>'.repeat(5-n);
}

function mkCard(sp){
  var lang  = mkLang;
  var name  = (lang==='en'?sp['nombre_en']:sp['nombre_es'])    || sp['nombre_es']      || '';
  var spec  = (lang==='en'?sp['especialidad_en']:sp['especialidad_es']) || sp['especialidad_es'] || '';
  var bio   = (lang==='en'?sp['bio_en']:sp['bio_es'])          || sp['bio_es']         || '';
  var photo = sp['foto_url']    || 'https://images.unsplash.com/photo-1552374196-c4e7ffc6e126?w=600&q=80';
  var book  = sp['booking_url'] || '#';
  var langs = sp['idiomas']     || 'ES';
  var rat   = parseFloat(sp['rating'])  || 5;
  var revs  = parseInt(sp['resenas'])   || 0;
  var avail = sp['disponibilidad']      || 'today';
  var tags  = (sp['tags']||'').split(',').map(function(t){return t.trim();}).filter(Boolean);
  var tec   = (sp['tecnica']||'').toLowerCase().trim();
  var enf   = (sp['enfoque']||'').toLowerCase().trim();
  var langA = langs.toLowerCase()
    .replace(/espa[ñn]ol/g,'es').replace(/ingl[eé]s|english/g,'en').replace(/portugu[eé]s/g,'pt');

  var tagsH = tags.slice(0,3).map(function(t,i){
    return '<span class="mk-tag '+MK_COLORS[i%MK_COLORS.length]+'">'+t+'</span>';
  }).join('');
  var availL = (MK_AVAIL[lang]||MK_AVAIL.es)[avail]||MK_AVAIL.es.today;
  var bookL  = MK_BOOK[lang];

  return '<div class="mk-card" data-tecnica="'+tec+'" data-enfoque="'+enf+'" data-idioma="'+langA+'" data-name="'+name.toLowerCase()+' '+spec.toLowerCase()+'">'
    +'<img class="mk-card-img" src="'+photo+'" alt="'+name+'" onerror="this.src=\'https://images.unsplash.com/photo-1552374196-c4e7ffc6e126?w=600&q=80\'">'
    +'<div class="mk-card-overlay"></div>'
    +'<div class="mk-card-top">'
    +'<div class="mk-avail"><div class="mk-avail-dot"></div>'+availL+'</div>'
    +'<div class="mk-lang-badge">'+langs+'</div>'
    +'</div>'
    +'<div class="mk-card-body">'
    +'<div class="mk-card-spec">'+spec+'</div>'
    +'<div class="mk-card-name">'+name+'</div>'
    +'<div class="mk-card-bio">'+bio+'</div>'
    +'<div class="mk-stars"><span class="mk-stars-gold">'+mkStars(rat)+'</span>'
    +'<span class="mk-stars-ct">'+rat.toFixed(1)+' ('+revs+')</span></div>'
    +'<div class="mk-card-tags">'+tagsH+'</div>'
    +'<a class="mk-cta" href="'+book+'" target="_blank">'+bookL+' <span class="mk-cta-arr">&#8594;</span></a>'
    +'</div></div>';
}

function mkRender(){
  var grid   = document.getElementById('mkGrid');
  var status = document.getElementById('mkStatus');
  grid.querySelectorAll('.mk-card').forEach(function(c){c.remove();});

  var vis = 0;
  mkData.forEach(function(sp){
    var el = document.createElement('div');
    el.innerHTML = mkCard(sp);
    var card = el.firstElementChild;
    var tec  = card.dataset.tecnica||'';
    var enf  = card.dataset.enfoque||'';
    var idm  = card.dataset.idioma||'';
    var nm   = card.dataset.name||'';
    var ok =
      (mkFilters.tecnica==='all'||tec.includes(mkFilters.tecnica)) &&
      (mkFilters.idioma ==='all'||idm.includes(mkFilters.idioma))  &&
      (mkFilters.enfoque==='all'||enf.includes(mkFilters.enfoque)) &&
      (!mkSearch||nm.includes(mkSearch));
    if(!ok) card.classList.add('hidden'); else vis++;
    grid.insertBefore(card, status);
  });

  document.getElementById('mkVisCount').textContent = vis;
  if(vis===0){
    status.style.display='block';
    status.innerHTML = (mkLang==='en'?'No results':'Sin resultados')
      +'<small>'+(mkLang==='en'?'Try different filters':'Prueba otros filtros')+'</small>';
  } else {
    status.style.display='none';
  }
  mkApplyLang();
}

function mkSetLang(l){
  mkLang = l;
  localStorage.setItem('mk_lang',l);
  document.querySelectorAll('#mk-root .mk-lang-btn').forEach(function(b){
    b.classList.toggle('on', b.dataset.lang===l);
  });
  mkRender();
}

function mkApplyLang(){
  document.querySelectorAll('#mk-root [data-es]').forEach(function(el){
    var txt = el.getAttribute('data-'+mkLang);
    if(!txt) return;
    if(el.innerHTML&&el.innerHTML.indexOf('<')>-1) el.innerHTML=txt;
    else el.textContent=txt;
  });
  var s=document.getElementById('mkSearch');
  if(s) s.placeholder=s.getAttribute('data-ph-'+mkLang)||s.placeholder;
}

// Pills
document.querySelectorAll('#mk-root .mk-pill').forEach(function(btn){
  btn.addEventListener('click',function(){
    var f=btn.dataset.f, v=btn.dataset.v;
    mkFilters[f]=v;
    document.querySelectorAll('#mk-root .mk-pill[data-f="'+f+'"]').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    mkRender();
  });
});
document.getElementById('mkSearch').addEventListener('input',function(){
  mkSearch=this.value.trim().toLowerCase(); mkRender();
});
document.getElementById('mkClearBtn').addEventListener('click',function(){
  Object.keys(mkFilters).forEach(function(k){mkFilters[k]='all';});
  mkSearch='';
  document.getElementById('mkSearch').value='';
  document.querySelectorAll('#mk-root .mk-pill').forEach(function(b){
    b.classList.toggle('on',b.dataset.v==='all');
  });
  mkRender();
});

// Fetch Google Sheets
function mkFetch(){
  var url='https://docs.google.com/spreadsheets/d/'+MK_SHEET_ID
    +'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(MK_SHEET_NAME);
  fetch(url).then(function(r){return r.text();}).then(function(text){
    var m=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!m){throw new Error('No data');}
    var json=JSON.parse(m[1]);
    var cols=json.table.cols.map(function(c){return c.label.trim();});
    mkData=json.table.rows.map(function(row){
      var obj={};
      cols.forEach(function(col,i){obj[col]=row.c[i]?(row.c[i].v??''):'';});
      return obj;
    }).filter(function(r){return r['nombre_es'];});
    mkRender();
  }).catch(function(){
    document.getElementById('mkStatus').innerHTML=
      'No se pudo cargar la lista<small>Verifica que la hoja de Google Sheets sea pública</small>';
  });
}

mkApplyLang();
mkFetch();
</script>
